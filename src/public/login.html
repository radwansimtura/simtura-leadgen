<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simtura Command — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: #0B1730;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow layers */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% -10%, rgba(59,127,237,.22) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(37,99,235,.1) 0%, transparent 60%);
    }

    /* Subtle grid pattern */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .logo {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    .logo-img {
      height: 44px; width: auto;
      border-radius: 8px;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,.4));
    }

    .logo-sub {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.3);
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.97);
      border-radius: 18px;
      padding: 44px 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 4px rgba(0,0,0,.12), 0 24px 64px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 21px; font-weight: 800; color: #0F172A;
      margin-bottom: 4px; letter-spacing: -0.4px;
    }
    .subtitle { font-size: 13px; color: #94A3B8; margin-bottom: 30px; }

    label { display: block; font-size: 12.5px; font-weight: 600; color: #374151; margin-bottom: 6px; }

    .input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 9px;
      font-family: inherit; font-size: 14px; color: #0F172A;
      outline: none; transition: border-color .15s, box-shadow .15s;
      margin-bottom: 16px;
      background: #FAFBFC;
    }
    .input:focus {
      border-color: #3B7FED;
      box-shadow: 0 0 0 3.5px rgba(59,127,237,.12);
      background: #fff;
    }

    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #3B7FED 0%, #2563EB 100%);
      color: #fff;
      border: none; border-radius: 9px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s, transform .1s;
      margin-top: 6px;
      box-shadow: 0 4px 14px rgba(59,127,237,.4);
      letter-spacing: .1px;
    }
    .btn:hover { opacity: .92; box-shadow: 0 6px 20px rgba(59,127,237,.45); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .error {
      background: #FEF2F2; border: 1px solid #FECACA;
      color: #DC2626; font-size: 13px;
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 14px; display: none;
    }

    .footer {
      position: relative; z-index: 1;
      font-size: 11px; color: rgba(255,255,255,.18);
      letter-spacing: .3px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="simtura-logo.png" alt="Simtura" class="logo-img">
    <span class="logo-sub">Command · Internal</span>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Authorized access only</p>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <label for="email">Email</label>
      <input class="input" type="email" id="email" placeholder="you@simtura.ai" required autocomplete="email">
      <label for="password">Password</label>
      <input class="input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <button class="btn" type="submit" id="submitBtn">Sign in</button>
    </form>
  </div>

  <div class="footer">© 2026 Simtura · Internal use only</div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true; btn.textContent = 'Signing in…';
      err.style.display = 'none';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Sign in failed';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Network error. Please try again.';
        err.style.display = 'block';
      }

      btn.disabled = false; btn.textContent = 'Sign in';
    }
  </script>
</body>
</html>
